name: Test

# Run platform-foundation tests on every PR and push to main.
#
# This workflow gates merges. The unit / integration suites are CI-blocking;
# the cargo (Rust) suite gates the platform-foundation SQLite migration.
# A red workflow blocks the PR.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  unit-and-integration:
    name: Vitest (unit + integration)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Unit tests
        run: pnpm run test
      - name: Integration tests
        run: pnpm run test:integration

  cargo-tests:
    name: Cargo (Rust) tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: System dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: cargo test (manifest_io migration)
        run: cargo test --manifest-path src-tauri/Cargo.toml --lib commands::manifest_io

  codegen-drift:
    name: Manifest codegen drift check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: System dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-codegen-${{ hashFiles('src-tauri/Cargo.lock') }}
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Regenerate manifest schema + ts and verify no drift
        run: pnpm run codegen:check
