name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Test ────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

  # ─── Build macOS ─────────────────────────────────────────────────
  build-macos:
    name: Build macOS (Apple Silicon)
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Python sidecar
        run: |
          pip install pyinstaller
          pip install -r sidecar/requirements.txt
          pyinstaller sidecar.spec --distpath sidecar-dist

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Seven HROps ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installer.'
          releaseDraft: true
          prerelease: false
          args: '--target aarch64-apple-darwin'

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seven-hrops-macos
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  # ─── Build Windows ───────────────────────────────────────────────
  build-windows:
    name: Build Windows (x86_64)
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Python sidecar
        run: |
          pip install pyinstaller
          pip install -r sidecar/requirements.txt
          pyinstaller sidecar.spec --distpath sidecar-dist
        shell: bash

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Seven HROps ${{ github.ref_name }}'
          releaseBody: 'See the assets below to download the installer.'
          releaseDraft: true
          prerelease: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: seven-hrops-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  # ─── Release ─────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            seven-hrops-macos/*.dmg
            seven-hrops-windows/*.msi
            seven-hrops-windows/*.exe
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
